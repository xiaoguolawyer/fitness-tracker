<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>小国 · 增肌减脂</title>

<link rel="manifest" href="manifest.webmanifest">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f0f;color:#e0e0e0;max-width:480px;margin:0 auto;padding:16px 16px 80px;line-height:1.6;-webkit-tap-highlight-color:transparent}
h1{font-size:22px;margin:0 0 4px}
h2{font-size:17px;margin:20px 0 10px;padding-bottom:6px;border-bottom:2px solid #2a2a2a}
h3{font-size:15px;margin:16px 0 6px;color:#aaa}
.header{position:sticky;top:0;background:#0f0f0f;padding:16px 0 10px;z-index:10;border-bottom:1px solid #1f1f1f}
.meta{font-size:13px;color:#888;margin-bottom:8px}
.tabs{display:flex;gap:4px;margin:12px 0;overflow-x:auto}
.tab{flex:1;min-width:60px;padding:8px 4px;text-align:center;font-size:12px;border-radius:8px;background:#1a1a1a;border:1px solid #2a2a2a;color:#888;cursor:pointer;white-space:nowrap}
.tab.active{background:#2563eb;border-color:#2563eb;color:#fff;font-weight:600}
.tab.today{box-shadow:0 0 0 2px #3b82f6}
.shift-bar{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0;align-items:center}
.shift-btn{font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid #555;background:#1a1a1a;color:#aaa;cursor:pointer;white-space:nowrap}
.shift-btn:active{background:#333}
.shift-btn.danger{border-color:#ef4444;color:#ef4444}
.block{margin:12px 0;padding:12px;background:#1a1a1a;border-radius:10px}
.block-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.block-title strong{font-size:14px}

.block-title .rest{font-size:11px;color:#3b82f6}
.exercise{display:flex;align-items:flex-start;padding:10px 0;border-bottom:1px solid #222;gap:10px}
.exercise:last-child{border-bottom:none}
.ex-con{flex:1;min-width:0}
.ex-name{font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px}
.ex-spec{font-size:11px;color:#888;margin-top:2px}
.ex-progress{font-size:11px;margin-top:4px;padding:5px 8px;border-radius:5px;line-height:1.5}
.ex-progress.last{background:#1a2a1a;color:#8fbc8f}
.ex-progress.suggest{background:#1a1a2a;color:#7b9fe0}
.ex-progress.warn{background:#2a1a1a;color:#e0a0a0}
.ex-detail{font-size:12px;color:#aaa;margin-top:6px;padding:8px;background:#141414;border-radius:6px;display:none;line-height:1.6}
.ex-detail.show{display:block}
.ex-toggle{font-size:11px;color:#3b82f6;cursor:pointer;margin-top:4px;display:inline-block}
.sets{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.set{width:28px;height:28px;border-radius:50%;border:2px solid #3a3a3a;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;transition:all .15s}
.set.done{background:#2563eb;border-color:#2563eb;color:#fff}
.set span{font-size:8px}
.hiit-block{margin:12px 0;padding:12px;background:#1a1a1a;border-radius:10px;border:1px solid #2a2a2a}
.hiit-block .rounds{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.hiit-round{width:34px;height:34px;border-radius:50%;border:2px solid #ea580c;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;color:#ea580c}
.hiit-round.done{background:#ea580c;color:#fff}
.summary{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#1a1a1a;border-top:2px solid #2563eb;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;z-index:20}
.summary .stat{font-size:13px;color:#aaa}
.summary .stat b{color:#fff}
.summary button{padding:10px 20px;border-radius:8px;border:none;background:#2563eb;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.summary button:disabled{background:#333;color:#666}
.timer{display:none;padding:10px;margin:8px 0;background:#0a0a0a;border-radius:8px;text-align:center}
.timer.show{display:block}
.timer .time{font-size:36px;font-weight:700;color:#3b82f6;font-variant-numeric:tabular-nums}
.timer .label{font-size:11px;color:#888}
.timer button{font-size:12px;padding:6px 14px;margin:4px;border-radius:6px;border:1px solid #3b82f6;background:transparent;color:#3b82f6;cursor:pointer}
.timer button.active{background:#2563eb;color:#fff;border-color:#2563eb}
.nutrition{margin:8px 0;padding:10px 12px;background:#0a2a0a;border-radius:8px;font-size:12px;line-height:1.5}
.nutrition strong{color:#4ade80}
.back-btn{display:inline-block;margin-bottom:12px;font-size:13px;padding:6px 12px;border-radius:6px;border:1px solid #555;background:#1a1a1a;color:#aaa;cursor:pointer}
.hist-entry{margin:10px 0;padding:12px;background:#1a1a1a;border-radius:10px;cursor:pointer}
.hist-entry .h-date{font-size:14px;font-weight:600}
.hist-entry .h-info{font-size:12px;color:#888;margin-top:4px}
.hist-entry .h-detail{font-size:12px;color:#aaa;margin-top:8px;display:none;line-height:1.6}
.hist-entry.expanded .h-detail{display:block}
.hist-entry .h-badge{display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;margin-left:6px}
.hist-entry .h-badge.complete{background:#1a3a1a;color:#4ade80}
.hist-entry .h-badge.partial{background:#3a2a1a;color:#fbbf24}
.rpe-slider{margin:12px 0}
.rpe-slider label{font-size:13px;color:#aaa}

.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:30;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#1a1a1a;border-radius:12px;padding:20px;max-width:90%;max-height:80vh;overflow-y:auto;margin:20px}
.modal h3{margin-top:0}
.modal-btn{padding:10px 20px;border-radius:8px;border:none;font-size:14px;cursor:pointer;margin:4px}
.modal-btn.primary{background:#2563eb;color:#fff}
.modal-btn.secondary{background:#333;color:#ccc}
.settings-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #222}

.settings-row input[type=date]{background:#0f0f0f;color:#e0e0e0;border:1px solid #333;border-radius:6px;padding:6px;font-size:13px}

.rm-test-btn{font-size:11px;padding:1px 8px;border-radius:10px;border:1px solid #c9a227;color:#c9a227;cursor:pointer;margin-left:6px;font-weight:400}
.save-ex input[type=number]{-moz-appearance:textfield}
.save-ex input{font-size:14px}
.rm-modal-note{font-size:12px;color:#aaa;margin:6px 0}
.protein-card{margin:8px 0;padding:12px;background:#0a2a0a;border-radius:10px;border:1px solid #1a4a1a}
.protein-card .block-title strong{font-size:14px;color:#4ade80}
.protein-card .info{font-size:12px;color:#8fbc8f}
.protein-bar{height:10px;background:#0f0f0f;border-radius:6px;overflow:hidden;margin:8px 0}
.protein-fill{height:100%;background:linear-gradient(90deg,#22c55e,#4ade80);transition:width .3s}
.protein-num{font-size:15px;color:#e0e0e0}
.protein-num b{font-size:20px;color:#4ade80}
.protein-num .met{color:#4ade80;font-size:12px;margin-left:6px}
.protein-quick{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.protein-quick button{flex:1;min-width:86px;font-size:12px;padding:8px 4px;border-radius:8px;border:1px solid #1a4a1a;background:#0f1f0f;color:#cfe9cf;cursor:pointer;line-height:1.3}

.protein-custom input{background:#0f0f0f;color:#e0e0e0;border:1px solid #333;border-radius:6px;padding:6px;font-size:12px}
.protein-custom input.food{width:88px}
.protein-custom input.gram{width:60px}
.protein-custom button{font-size:12px;padding:6px 12px;border-radius:6px;border:1px solid #4ade80;background:transparent;color:#4ade80;cursor:pointer}
.protein-list{margin-top:8px;font-size:12px;color:#aaa}
.protein-list .pe{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #1a2a1a}
.protein-list .pe:last-child{border-bottom:none}
.protein-list .pe .del{color:#ef4444;cursor:pointer;font-size:11px}
.protein-ref{font-size:11px;color:#6f9f6f;margin-top:6px;line-height:1.5}
.protein-calc{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.pchip{font-size:12px;padding:6px 10px;border-radius:16px;border:1px solid #1a4a1a;background:#0f1f0f;color:#cfe9cf;cursor:pointer}
.pchip.sel{background:#1a5a1a;border-color:#4ade80;color:#fff;font-weight:600}
.protein-input{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:10px;font-size:13px;color:#cfe9cf}
.protein-input input{width:76px;background:#0f0f0f;color:#e0e0e0;border:1px solid #333;border-radius:6px;padding:6px;font-size:15px}
.protein-input b{font-size:17px;color:#4ade80}
.protein-input .add-btn{margin-left:auto;font-size:13px;padding:7px 16px;border-radius:6px;border:1px solid #4ade80;background:transparent;color:#4ade80;cursor:pointer}
.protein-input .add-btn:active{background:#1a3a1a}
.carb-card{margin:8px 0;padding:12px;background:#0a1a2a;border-radius:10px;border:1px solid #1a3a5a}
.carb-card .block-title strong{font-size:14px;color:#60a5fa}
.carb-card .info{font-size:12px;color:#7b9fe0}
.carb-card table{width:100%;font-size:12px;border-collapse:collapse;margin-top:8px}
.carb-card th{text-align:left;color:#7b9fe0;padding:5px 4px;border-bottom:1px solid #1a3a5a;font-weight:600}
.carb-card td{padding:5px 4px;color:#cdd9e8;border-bottom:1px solid #14243a}
.carb-card .gi-low{color:#4ade80;font-weight:600}
.carb-card .gi-mid{color:#fbbf24;font-weight:600}
.carb-card .gi-high{color:#f87171;font-weight:600}
.carb-note{font-size:11px;color:#6f8fbf;margin-top:8px;line-height:1.7}
.carb-toggle{font-size:12px;color:#60a5fa;cursor:pointer;margin-top:4px;display:inline-block}
.carb-body{display:none}
.carb-body.show{display:block}
.carb-bar{height:10px;background:#0f0f0f;border-radius:6px;overflow:hidden;margin:8px 0}
.carb-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#60a5fa);transition:width .3s}
.carb-num{font-size:15px;color:#e0e0e0}
.carb-num b{font-size:20px;color:#60a5fa}
.carb-num .rng{color:#7b9fe0;font-size:12px;margin-left:6px}
.carb-num .met{color:#4ade80;font-size:12px;margin-left:6px}
.carb-num .over{color:#fbbf24;font-size:12px;margin-left:6px}
.carb-calc{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.cchip{font-size:12px;padding:6px 10px;border-radius:16px;border:1px solid #1a3a5a;background:#0f1a2a;color:#cdd9e8;cursor:pointer}
.cchip.sel{background:#1a4a7a;border-color:#60a5fa;color:#fff;font-weight:600}
.carb-input{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:10px;font-size:13px;color:#cdd9e8}
.carb-input input{width:76px;background:#0f0f0f;color:#e0e0e0;border:1px solid #333;border-radius:6px;padding:6px;font-size:15px}
.carb-input b{font-size:17px;color:#60a5fa}
.carb-input .add-btn{margin-left:auto;font-size:13px;padding:7px 16px;border-radius:6px;border:1px solid #60a5fa;background:transparent;color:#60a5fa;cursor:pointer}
.carb-input .add-btn:active{background:#1a3a5a}
.carb-custom{display:flex;gap:6px;margin-top:8px;align-items:center;flex-wrap:wrap}
.carb-custom input{background:#0f0f0f;color:#e0e0e0;border:1px solid #333;border-radius:6px;padding:6px;font-size:12px}
.carb-custom input.food{width:88px}
.carb-custom input.gram{width:60px}
.carb-custom button{font-size:12px;padding:6px 12px;border-radius:6px;border:1px solid #60a5fa;background:transparent;color:#60a5fa;cursor:pointer}
.carb-list{margin-top:8px;font-size:12px;color:#aaa}
.carb-list .ce{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #14243a}
.carb-list .ce:last-child{border-bottom:none}
.carb-list .ce .del{color:#ef4444;cursor:pointer;font-size:11px}
</style>
</head>
<body>

<div class="header">
  <h1>🏋️ 小国 · 增肌减脂</h1>
  <div class="meta" id="dayLabel">加载中…</div>
  <div class="shift-bar">
    <button class="shift-btn" onclick="shiftCycle(1)">⏭ 今天没练 → 顺延</button>
    <button class="shift-btn" onclick="showSettings()">⚙️ 设置</button>
    <button class="shift-btn" onclick="manualClean()" style="border-color:#4ade80;color:#4ade80">🧹 清理空记录</button>
    <button class="shift-btn" onclick="restoreFromCloud()" style="border-color:#60a5fa;color:#60a5fa">☁️ 从云端恢复</button>
    <button class="shift-btn" onclick="showHistory()">📋 历史</button>
  </div>
  <div class="tabs" id="tabs"></div>
</div>

<div id="content"></div>

<div class="summary" id="summary">
  <div class="stat">✅ <b id="doneCount">0</b>/<span id="totalCount">0</span></div>
  <button id="saveBtn" onclick="openSaveModal()">保存记录</button>
</div>

<!-- Save Modal -->
<div class="modal-overlay" id="saveModal">
  <div class="modal">
    <h3>保存训练记录</h3>
    <div id="saveSummary"></div>
    <div style="text-align:center;margin-top:16px">
      <button class="modal-btn primary" onclick="confirmSave()">✅ 确认保存</button>
      <button class="modal-btn secondary" onclick="closeModal('saveModal')">取消</button>
    </div>
  </div>
</div>

<!-- RM Test Modal -->
<div class="modal-overlay" id="rmModal">
  <div class="modal">
    <h3>🔬 测 RM：<span id="rmExName"></span></h3>
    <p class="rm-modal-note">选一个能做到力竭的次数（建议 8-12 次），做至动作开始变形即停，记录阻力与次数。这是你该动作的真实力量基线。</p>
    <div style="margin:10px 0">
      <label style="font-size:13px;color:#aaa">阻力 / 重量</label><br>
      <input id="rmWeight" placeholder="如 20lb 或 15kg" style="width:100%;background:#0f0f0f;color:#e0e0e0;border:1px solid #333;border-radius:6px;padding:8px;margin-top:4px">
    </div>
    <div style="margin:10px 0">
      <label style="font-size:13px;color:#aaa">力竭次数（做到做不动）</label><br>
      <input id="rmReps" type="number" min="1" value="12" style="width:100%;background:#0f0f0f;color:#e0e0e0;border:1px solid #333;border-radius:6px;padding:8px;margin-top:4px">
    </div>
    <div style="text-align:center;margin-top:16px">
      <button class="modal-btn primary" onclick="saveRm()">✅ 保存RM</button>
      <button class="modal-btn secondary" onclick="closeModal('rmModal')">取消</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h3>⚙️ 设置</h3>
    <div class="settings-row">
      <label>循环起始日</label>
      <input type="date" id="cycleStartInput" onchange="updateCycleStart(this.value)">
    </div>
    <div class="settings-row">
      <label>当前顺延天数</label>
      <span id="shiftDisplay" style="font-size:14px;color:#3b82f6">0天</span>
    </div>
    <div style="margin:12px 0">
      <button class="modal-btn secondary" onclick="resetCycle()">🔄 重置循环（从今天开始）</button>
    </div>
    <div style="margin:12px 0;padding-top:12px;border-top:1px solid #222">
      <button class="modal-btn secondary" onclick="exportData()">📦 导出数据</button>
      <button class="modal-btn secondary" onclick="document.getElementById('importFile').click()">📥 导入数据</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    </div>
    <div style="margin:12px 0;padding-top:12px;border-top:1px solid #222">
      <div style="font-size:13px;color:#aaa;margin-bottom:6px">☁️ 云端同步（自动推送到 GitHub Gist，AI 可直接读取）</div>
      <div class="settings-row">
        <label>GitHub 令牌</label>
        <input type="password" id="syncToken" placeholder="ghp_...（仅存本机浏览器）" style="width:200px;background:#0f0f0f;color:#e0e0e0;border:1px solid #333;border-radius:6px;padding:6px">
      </div>
      <div class="settings-row">
        <label>同步状态</label>
        <span id="syncStatus" style="font-size:13px;color:#888">未配置</span>
      </div>
      <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">
        <button class="modal-btn secondary" onclick="saveSyncConfig()">💾 保存配置</button>
        <button class="modal-btn secondary" onclick="testSync()">🔄 测试同步</button>
        <button class="modal-btn secondary" onclick="copySyncUrl()">📋 复制读取地址</button>
        <button class="modal-btn secondary" onclick="resetSync()">🧹 重置同步</button>
        <button class="modal-btn secondary" onclick="manualClean()" style="border-color:#4ade80;color:#4ade80">🧹 清理空记录</button>
      </div>
      <div class="rm-modal-note" style="margin-top:6px">令牌需 gist 权限，自动创建公开 Gist；仅存你手机浏览器，不经过 AI。</div>
      <div id="syncUrlBox" style="font-size:11px;color:#7b9fe0;word-break:break-all;margin-top:4px"></div>
    </div>
    <div style="margin:12px 0;padding-top:12px;border-top:1px solid #222">
      <button class="modal-btn secondary" onclick="showProgressionView()" style="width:100%">📈 查看渐进超负荷趋势</button>
    </div>
    <div style="margin:12px 0;padding-top:12px;border-top:1px solid #222">
      <button class="modal-btn secondary" style="border-color:#ef4444;color:#ef4444;width:100%" onclick="clearAllData()">🗑 清空所有数据</button>
    </div>
    <div style="text-align:center;margin-top:12px">
      <button class="modal-btn secondary" onclick="closeModal('settingsModal')">关闭</button>
    </div>
  </div>
</div>

<script>
// ============ DATA: 训练计划 ============
const DEFAULT_CYCLE_START = '2026-07-12'; // 6天滚动循环起点（7/12推力→7/13拉力→7/14下肢→7/15推力→7/16拉力→7/17下肢→7/18恢复）
const DAYS = ['推力+HIIT','拉力+核心','下肢+HIIT','推力+HIIT','拉力+核心','下肢+HIIT','主动恢复'];
const DAY_KEYS = ['push','pull','legs','push','pull','legs','recovery'];
const WEIGHT_LADDER = ['15lb','20lb','25lb'];
const RIR_TARGET = 2; // 训练留2次余量（≈RPE 8），RM减去它即为训练目标次数
const HYPERTROPHY_MAX = 25; // 实用上限：RM超此值才提示加重（5-30次均有效，见Schoenfeld2017）

// 动作标准（全程标准=力竭判定锚点 + 常见错误），综合自 ACE/NSCA/Mass General 等权威来源
const ACTION_STANDARDS = {
  '弹力绳面拉': {anchor:'手柄到面部 + 肩胛明确后缩', errors:'只用手臂拉不夹背、锚点过低做成前平举'},

// ============ STATE ============
let cycleStartDate = DEFAULT_CYCLE_START;
let currentTab = 0;
let checkedState = {};
let history = [];
let rmRecords = {};

function init(){
  try {
    cycleStartDate = localStorage.getItem('fitness_cycle_start') || DEFAULT_CYCLE_START;
  } catch(e) {}
  currentTab = getDayIndex();
  checkedState = loadJSON('fitness_state', {});
  history = loadJSON('fitness_history', []);
  rmRecords = loadJSON('fitness_rm', {});
  // 迁移旧文本日志
  migrateOldLog();
  // 打开即自动清理空记录（exercises 为空），并推回云端
  const removedEmpty = cleanEmptyRecords();
  render();
  if(removedEmpty > 0) console.log('[健身] 已自动清理 ' + removedEmpty + ' 条空记录');
  // 本地 RM 为空时自动从云端拉回（换地址/设备不丢基准数据）
  autoRestoreRmIfEmpty();
}

function loadJSON(key, fallback){
  try{
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  }catch(e){ return fallback; }
}

function safeLocalStorage(action, key, val){
  try { return localStorage[action](key, val); } catch(e) { return null; }
}

function saveState(){
  localStorage.setItem('fitness_state', JSON.stringify(checkedState));
}

function saveHistory(){
  localStorage.setItem('fitness_history', JSON.stringify(history));
}

function saveRmStore(){
  localStorage.setItem('fitness_rm', JSON.stringify(rmRecords));
}

// ============ 循环日期计算（支持顺延） ============
function getDayIndex(){
  const start = new Date(cycleStartDate + 'T00:00:00+08:00');
  const now = new Date();
  const diffDays = Math.floor((now.getTime() - start.getTime()) / 86400000);
  return ((diffDays % DAYS.length) + DAYS.length) % DAYS.length;
}

function getPlan(idx){
  return PLAN[DAY_KEYS[idx]];
}

function getDayKey(idx){
  return DAY_KEYS[idx];
}

function shiftCycle(days){
  const d = new Date(cycleStartDate + 'T00:00:00+08:00');
  d.setDate(d.getDate() + days);
  cycleStartDate = d.toISOString().split('T')[0];
  localStorage.setItem('fitness_cycle_start', cycleStartDate);
  currentTab = getDayIndex();
  render();
  if(days > 0){
    alert('✅ 已顺延' + days + '天，今天变更为：' + getPlan(currentTab).name);
  }
}

function resetCycle(){
  if(!confirm('确定从今天重新开始循环？\n（历史记录不会删除）')) return;
  const today = new Date().toISOString().split('T')[0];
  cycleStartDate = today;
  localStorage.setItem('fitness_cycle_start', cycleStartDate);
  currentTab = 0;
  closeModal('settingsModal');
  render();
}

function updateCycleStart(val){
  cycleStartDate = val;
  localStorage.setItem('fitness_cycle_start', cycleStartDate);
  currentTab = getDayIndex();
  render();
}

function getShiftCount(){
  const original = new Date(DEFAULT_CYCLE_START + 'T00:00:00+08:00');
  const current = new Date(cycleStartDate + 'T00:00:00+08:00');
  return Math.round((current.getTime() - original.getTime()) / 86400000);
}

// ============ 渐进超负荷逻辑（RM 锚定） ============
function getLastSession(dayKey){
  // 找到同类型训练日的上一次记录
  for(let i = history.length - 1; i >= 0; i--){
    if(history[i].dayKey === dayKey && history[i].completed){
      return history[i];
    }
  }
  return null;
}

function getExerciseHistory(dayKey, exerciseName){
  // 获取某动作的所有历史记录
  const result = [];
  for(let i = 0; i < history.length; i++){
    if(history[i].dayKey !== dayKey) continue;
    const ex = (history[i].exercises || []).find(e => e.name === exerciseName);
    if(ex) result.push({ date: history[i].date, ...ex, rpe: history[i].rpe });
  }
  return result;
}

// 读取某动作的 RM 记录
function getRm(name){
  return rmRecords[name] || null;
}

// 把阻力字符串加重一档（健身房自由重量 +2.5kg / 弹力绳 +5lb）
function bumpWeight(w){
  const m = String(w).match(/([\d.]+)\s*([a-zA-Z%]*)/);
  if(!m) return null;
  const num = parseFloat(m[1]);
  const unit = m[2] || '';
  let add = 2.5;
  if(/lb/i.test(unit)) add = 5;
  return (num + add) + (unit ? unit : '');
}

// 取下一档重量：弹力绳按档位跳(15→20→25)，到顶或自由重量用bumpWeight
function getNextWeight(w){
  const wi = WEIGHT_LADDER.indexOf(w);
  if(wi >= 0 && wi < WEIGHT_LADDER.length - 1) return WEIGHT_LADDER[wi + 1];
  return bumpWeight(w);
}

// 自重动作（无 lb/kg 单位）：进阶靠换更难变式，靠加重档位
function isBodyweight(w){ return !/lb|kg/i.test(String(w || '')); }

// RM 锚定处方：训练次数 = RM次数 - 留余量(RIR_TARGET)
function getProgressionSuggestion(dayKey, ssIdx, exIdx, exercise){
  const rm = getRm(exercise.name);
  const lastSession = getLastSession(dayKey);
  let lastEx = null;
  if(lastSession){
    lastEx = (lastSession.exercises || []).find(e =>
      e.name === exercise.name && e.ssIdx === ssIdx && e.exIdx === exIdx
    );
  }
  const dateStr = lastSession ? lastSession.date.substring(5) : '';

  // 情况1：尚未测 RM —— 回退到基准计划，并提示先测
  if(!rm){
    const base = '按基准：' + exercise.weight + ' × ' + exercise.minRep + '-' + exercise.maxRep + '次';
    return {
      type: 'notest', rm: false, showTest: true,
      lastText: lastSession ? ('上次 ' + dateStr + '（未测RM）') : '首次训练（未测RM）',
      suggestText: base + ' · 建议先测RM校准',
      targetRep: exercise.minRep
    };
  }

  // 已有 RM，计算训练目标次数
  // 自重动作无法加重，4组累积疲劳下 RM-2 难以维持，且 RM 测试有 ±2 次误差 → 多留1次余量(RIR 3)
  const rirForTarget = isBodyweight(rm.weight) ? RIR_TARGET + 1 : RIR_TARGET;
  const targetRep = Math.max(1, rm.reps - rirForTarget);
  const tooLight = rm.reps > HYPERTROPHY_MAX; // RM超实用上限(>25)=次数过高效率低
  const nextW = tooLight ? getNextWeight(rm.weight) : null;

  // 情况2：有 RM 但无历史记录
  if(!lastEx){
    return {
      type: 'first', rm: true, showTest: true,
      lastText: tooLight
        ? '🔬 RM ' + rm.weight + ' × ' + rm.reps + ' ⚠️次数过高'
        : '🔬 RM ' + rm.weight + ' × ' + rm.reps + ' (留' + rirForTarget + ')',
      suggestText: tooLight
        ? (isBodyweight(rm.weight)
            ? '⚠️ ' + rm.reps + '次超实用上限(>25)，效率低！换更难变式重测RM · 暂用' + rm.weight + '×' + targetRep + '次先练'
            : '⚠️ ' + rm.reps + '次超实用上限(>25)，效率低！加重到' + nextW + '重测RM · 暂用' + rm.weight + '×' + targetRep + '次先练')
        : '今天：' + rm.weight + ' × ' + targetRep + '次（你的' + rm.reps + 'RM，留' + rirForTarget + '次）',
      targetRep: targetRep, rmWeight: rm.weight, newWeight: nextW
    };
  }

  // 情况3：有 RM 也有历史
  const lastRPE = (lastEx.rpe != null) ? lastEx.rpe : (lastSession.rpe || 7);
  const lastCompleted = lastEx.completedSets >= lastEx.plannedSets;
  const lastRep = lastEx.achievedRep || targetRep;

  // 上次没做完 → 补齐
  if(!lastCompleted){
    return {
      type: 'catchup', rm: true,
      lastText: '上次 ' + dateStr + ': ' + lastEx.weight + ' × ' + lastEx.completedSets + '/' + lastEx.plannedSets + '组 ⚠️ · RPE' + lastRPE,
      suggestText: '今天补齐：' + rm.weight + ' × ' + lastEx.plannedSets + '组 × ' + targetRep + '次',
      targetRep: targetRep, rmWeight: rm.weight
    };
  }

  // 上次轻松完成（RPE≤7）
  if(lastRPE <= 7){
    // RM次数过高(>25)→跳过加次/加组，直接加重重测
    if(tooLight){
      const bw = isBodyweight(rm.weight);
      return {
        type: 'addWeight', rm: true,
        lastText: '上次 ' + dateStr + ': ' + lastEx.weight + ' × ' + lastEx.completedSets + '组 · ' + lastRep + '次 · RPE' + lastRPE + ' ✅ · RM' + rm.reps + '⚠️过高',
        suggestText: bw
          ? 'RM=' + rm.reps + '次过高，换更难变式（脚抬高/窄距）重测RM · 暂用' + rm.weight + '×' + targetRep + '次'
          : 'RM=' + rm.reps + '次过高，加重：' + nextW + ' × ' + exercise.minRep + '次 · 重测RM',
        targetRep: exercise.minRep, rmWeight: rm.weight, newWeight: nextW
      };
    }
    const roomToAdd = (lastRep + 1) < rm.reps; // 还能再加1次且不到RM
    if(roomToAdd){
      // 加1次
      return {
        type: 'addRep', rm: true,
        lastText: '上次 ' + dateStr + ': ' + lastEx.weight + ' × ' + lastEx.completedSets + '组 · ' + lastRep + '次 · RPE' + lastRPE + ' ✅',
        suggestText: '上次轻松，加1次：' + rm.weight + ' × ' + (lastRep + 1) + '次',
        targetRep: lastRep + 1, rmWeight: rm.weight
      };
    }
    // 已到 RM-1，仍有余力 → 先加组，再加重
    if(lastEx.plannedSets < 4){
      return {
        type: 'addSet', rm: true,
        lastText: '上次 ' + dateStr + ': ' + lastEx.weight + ' × ' + lastEx.completedSets + '组 · ' + lastRep + '次(RM-1) · RPE' + lastRPE + ' ✅',
        suggestText: '次数到顶，加1组：' + rm.weight + ' × ' + (lastEx.plannedSets + 1) + '组 × ' + targetRep + '次',
        targetRep: targetRep, rmWeight: rm.weight
      };
    }
    // 组数也到顶 → 加重(或自重换变式)并提示重测 RM
    const nextW2 = getNextWeight(rm.weight);
    const bw2 = isBodyweight(rm.weight);
    if(nextW2 || bw2){
      return {
        type: 'addWeight', rm: true,
        lastText: '上次 ' + dateStr + ': ' + lastEx.weight + ' × ' + lastEx.completedSets + '组 · ' + lastRep + '次(RM-1) · RPE' + lastRPE + ' ✅',
        suggestText: bw2
          ? '已达' + rm.reps + 'RM上限，换更难变式（脚抬高/窄距）重测RM'
          : '已达' + rm.reps + 'RM上限，加重：' + nextW2 + ' × ' + exercise.minRep + '次 · 重测RM',
        targetRep: exercise.minRep, rmWeight: rm.weight, newWeight: nextW2 || null
      };
    }
  }

  // 上次很累（RPE≥9）或中等（RPE 8）→ 保持
  if(lastRPE >= 9){
    return {
      type: 'maintain', rm: true,
      lastText: '上次 ' + dateStr + ': ' + lastEx.weight + ' × ' + lastRep + '次 · RPE' + lastRPE + ' 😤',
      suggestText: '上次很累，保持：' + rm.weight + ' × ' + targetRep + '次',
      targetRep: targetRep, rmWeight: rm.weight
    };
  }

  return {
    type: 'maintain', rm: true,
    lastText: '上次 ' + dateStr + ': ' + lastEx.weight + ' × ' + lastRep + '次 · RPE' + lastRPE,
    suggestText: '保持：' + rm.weight + ' × ' + targetRep + '次',
    targetRep: targetRep, rmWeight: rm.weight
  };
}

// 渐进建议为「加组」时，打卡界面应渲染多出的一组（上限4组，与建议自身封顶一致）
function effectiveRounds(dayKey, ss, ssIdx, exIdx, ex){
  const s = getProgressionSuggestion(dayKey, ssIdx, exIdx, ex);
  return Math.min(4, ss.rounds + (s && s.type === 'addSet' ? 1 : 0));
}

// ============ 打卡状态管理 ============
function toggleSet(key){
  const parts = key.split('_');
  const dayKey = parts[0];
  const ssIdx = parseInt(parts[1]);
  const exIdx = parseInt(parts[2]);
  const setIdx = parseInt(parts[3]);

  const stateKey = dayKey + '_' + ssIdx + '_' + exIdx;
  if(!checkedState[stateKey]) checkedState[stateKey] = [];
  const arr = checkedState[stateKey];
  const pos = arr.indexOf(setIdx);
  if(pos >= 0) arr.splice(pos, 1);
  else arr.push(setIdx);
  saveState();
  render();
}

function toggleHiit(round){
  const dayKey = getDayKey(currentTab);
  if(!checkedState['hiit_' + dayKey]) checkedState['hiit_' + dayKey] = [];
  const arr = checkedState['hiit_' + dayKey];
  const pos = arr.indexOf(round);
  if(pos >= 0) arr.splice(pos, 1);
  else arr.push(round);
  saveState();
  render();
}

// 核心按轮整体勾选：state 形如 { "0":2, "1":1 } 表示各动作已完成轮数(0/1/2)
function getCoreState(dayKey){
  const s = checkedState['core_' + dayKey];
  if(Array.isArray(s)){ const o = {}; s.forEach(i => { o[i] = 1; }); return o; }
  return s || {};
}
// round: 0=第1轮, 1=第2轮。点一下把整轮所有动作标记完成，再点取消该轮
function toggleCoreRound(round){
  const dayKey = getDayKey(currentTab);
  const plan = getPlan(currentTab);
  const st = getCoreState(dayKey);
  const target = round + 1;
  const allAt = plan.core.every((_, i) => (st[i] || 0) >= target);
  plan.core.forEach((_, i) => { st[i] = allAt ? Math.max(0, target - 1) : Math.max(st[i] || 0, target); });
  checkedState['core_' + dayKey] = st;
  saveState();
  render();
}

function toggleRecoveryItem(key){
  const arr = checkedState[key] || [];
  if(arr.length > 0) checkedState[key] = [];
  else checkedState[key] = [1];
  saveState();
  render();
}

function toggleDetail(id){
  const el = document.getElementById(id);
  if(el) el.classList.toggle('show');
}

function isSetDone(dayKey, ssIdx, exIdx, setIdx){
  return (checkedState[dayKey + '_' + ssIdx + '_' + exIdx] || []).includes(setIdx);
}

function isHiitDone(dayKey, round){
  return (checkedState['hiit_' + dayKey] || []).includes(round);
}

function coreRoundDone(dayKey, round){
  const st = getCoreState(dayKey);
  const plan = getPlan(currentTab);
  return plan.core.every((_, i) => (st[i] || 0) >= round + 1);
}

function countDone(){
  let total = 0, done = 0;
  const plan = getPlan(currentTab);
  const dayKey = getDayKey(currentTab);
  if(plan.supersets){
    plan.supersets.forEach((ss, ssIdx) => {
      ss.items.forEach((ex, exIdx) => {
        const er = effectiveRounds(dayKey, ss, ssIdx, exIdx, ex);
        for(let i = 0; i < er; i++){
          total++;
          if(isSetDone(dayKey, ssIdx, exIdx, i)) done++;
        }
      });
    });
  }
  if(plan.hiit && plan.hiit.length > 0){
    for(let i = 0; i < 4; i++){ total++; if(isHiitDone(dayKey, i)) done++; }
  }
  if(plan.core){
    const coreSt = getCoreState(dayKey);
    plan.core.forEach((_, i) => { const r = Math.min(2, coreSt[i] || 0); total += 2; done += r; });
  }
  if(plan.items){
    plan.items.forEach((item, i) => {
      total++;
      if((checkedState[dayKey + '_items_' + i] || []).length > 0) done++;
    });
  }
  return { total, done };
}

async function confirmSave(){
  const { total, done } = countDone();
  const plan = getPlan(currentTab);
  const dayKey = getDayKey(currentTab);
  const date = new Date().toISOString().split('T')[0];

  const session = {
    date: date,
    dayKey: dayKey,
    dayName: plan.name,
    completed: done === total,
    completionRate: Math.round(done / total * 100),
    note: (document.getElementById('noteInput') || {}).value || '',
    exercises: []
  };
  let rpeSum = 0, rpeCnt = 0;

  if(plan.supersets){
    plan.supersets.forEach((ss, ssIdx) => {
      ss.items.forEach((ex, exIdx) => {
        const doneSets = (checkedState[dayKey + '_' + ssIdx + '_' + exIdx] || []).length;
        if(doneSets === 0) return;
        const wEl = document.getElementById('exw_' + ssIdx + '_' + exIdx);
        const rEl = document.getElementById('exr_' + ssIdx + '_' + exIdx);
        const rpeEl = document.getElementById('exrpe_' + ssIdx + '_' + exIdx);
        const weight = wEl ? wEl.value.trim() : (getProgressionSuggestion(dayKey, ssIdx, exIdx, ex).rmWeight || ex.weight);
        const reps = rEl ? (parseInt(rEl.value) || 1) : getProgressionSuggestion(dayKey, ssIdx, exIdx, ex).targetRep;
        const rpe = rpeEl ? parseInt(rpeEl.value) : 7;
        rpeSum += rpe; rpeCnt++;
        session.exercises.push({
          name: ex.name, ssIdx: ssIdx, exIdx: exIdx,
          weight: weight,
          plannedSets: effectiveRounds(dayKey, ss, ssIdx, exIdx, ex),
          completedSets: doneSets,
          achievedRep: reps,
          rpe: rpe
        });
      });
    });
  }
  session.rpe = rpeCnt ? Math.round(rpeSum / rpeCnt) : 7;

  // HIIT
  if(plan.hiit && plan.hiit.length > 0){
    session.hiit = {
      completed: (checkedState['hiit_' + dayKey] || []).length,
      total: 4
    };
  }

  // Core
  if(plan.core){
    const coreSt = getCoreState(dayKey);
    let coreDone = 0;
    plan.core.forEach((_, i) => { coreDone += Math.min(2, coreSt[i] || 0); });
    session.core = {
      completed: coreDone,
      total: plan.core.length * 2
    };
  }

  // Recovery items
  if(plan.items){
    session.recoveryItems = plan.items.map((item, i) => ({
      name: item.name,
      done: (checkedState[dayKey + '_items_' + i] || []).length > 0
    }));
  }

  // 防御：没有任何动作记录则取消保存，避免产生空记录
  if(session.exercises.length === 0){
    alert('⚠️ 本次没有任何动作记录，已取消保存（避免产生空记录）');
    closeModal('saveModal');
    return;
  }

  // 保存到历史
  history.push(session);
  saveHistory();

  // 清除当天打卡状态
  Object.keys(checkedState).forEach(k => {
    if(k.startsWith(dayKey) || k.startsWith('hiit_' + dayKey) || k.startsWith('core_' + dayKey)){
      delete checkedState[k];
    }
  });
  saveState();

  const syncR = await pushToGist();
  let syncText;
  if(!localStorage.getItem('fitness_sync_token')){
    syncText = '☁️ 未配置云端同步（记录仅存本机）';
  } else if(syncR.ok){
    syncText = '☁️ 已同步到云端 ✓';
  } else {
    syncText = '⚠️ 云端同步失败：' + syncR.msg + '\n   请打开设置→云端同步点「测试同步」重试';
  }

  closeModal('saveModal');
  render();
  alert('✅ 已保存！\n' + plan.name + ' · ' + done + '/' + total + ' · 平均RPE ' + session.rpe + '\n' + syncText);
}

// ============ 云端同步（GitHub Gist，自动推送） ============
const SYNC_FILE = 'fitness-sync.json';
function loadSyncConfig(){
  const t = localStorage.getItem('fitness_sync_token');
  const u = localStorage.getItem('fitness_sync_url');
  const tokEl = document.getElementById('syncToken');
  if(tokEl && t) tokEl.value = t;
  updateSyncStatus();
  const box = document.getElementById('syncUrlBox');
  if(box && u) box.textContent = u;
}
function updateSyncStatus(){
  const el = document.getElementById('syncStatus');
  if(!el) return;
  const g = localStorage.getItem('fitness_sync_gist');
  if(g){ el.textContent = '已配置 · Gist ' + g.slice(0,8); el.style.color = '#4ade80'; }
  else { el.textContent = '未配置'; el.style.color = '#888'; }
}
function saveSyncConfig(){
  const t = (document.getElementById('syncToken').value || '').trim();
  if(!t){ alert('请先填入 GitHub 令牌'); return; }
  localStorage.setItem('fitness_sync_token', t);
  updateSyncStatus();
  alert('✅ 配置已保存（仅存本机浏览器）');
  testSync();
}
function collectLocalData(){
  return {
    updatedAt: new Date().toISOString(),
    source: 'fitness-site',
    cycleStart: localStorage.getItem('fitness_cycle_start') || DEFAULT_CYCLE_START,
    history: JSON.parse(localStorage.getItem('fitness_history') || '[]'),
    state: JSON.parse(localStorage.getItem('fitness_state') || '{}'),
    rm: JSON.parse(localStorage.getItem('fitness_rm') || '{}'),
    rmRecords: JSON.parse(localStorage.getItem('fitness_rm') || '{}'),
    protein: JSON.parse(localStorage.getItem('fitness_protein') || '{}'),
    carb: JSON.parse(localStorage.getItem('fitness_carb') || '{}')
  };
}
async function pushToGist(){
  const token = localStorage.getItem('fitness_sync_token');
  if(!token) return { ok:false, msg:'未配置令牌' };
  let gistId = localStorage.getItem('fitness_sync_gist');
  const payload = JSON.stringify(collectLocalData(), null, 2);
  const headers = { 'Authorization': 'token ' + token, 'Content-Type': 'application/json' };
  try{
    if(!gistId){
      const res = await fetch('https://api.github.com/gists', {
        method:'POST', headers: headers,
        body: JSON.stringify({ public:true, files:{ [SYNC_FILE]:{ content: payload } } })
      });
      if(!res.ok) return { ok:false, msg:'创建失败 HTTP '+res.status };
      const data = await res.json();
      gistId = data.id;
      localStorage.setItem('fitness_sync_gist', gistId);
      const rawUrl = 'https://gist.githubusercontent.com/' + data.owner.login + '/' + gistId + '/raw/' + SYNC_FILE;
      localStorage.setItem('fitness_sync_url', rawUrl);
      const box = document.getElementById('syncUrlBox');
      if(box) box.textContent = rawUrl;
    } else {
      const res = await fetch('https://api.github.com/gists/' + gistId, {
        method:'PATCH', headers: headers,
        body: JSON.stringify({ files:{ [SYNC_FILE]:{ content: payload } } })
      });
      if(!res.ok) return { ok:false, msg:'更新失败 HTTP '+res.status };
    }
    return { ok:true, url: localStorage.getItem('fitness_sync_url') };
  }catch(e){ return { ok:false, msg: e.message }; }
}
async function testSync(){
  const before = collectLocalData();
  const r = await pushToGist();
  updateSyncStatus();
  if(r.ok){
    const cnt = (before.history||[]).length;
    const rmCnt = Object.keys(before.rm||{}).length;
    document.getElementById('syncStatus').textContent = '同步成功 ✓';
    document.getElementById('syncStatus').style.color = '#4ade80';
    alert('✅ 同步成功！\n已推送 ' + cnt + ' 条训练历史 / ' + rmCnt + ' 组 RM\n把「AI 读取地址」复制并发给 AI 一次即可：\n' + (r.url||''));
  } else {
    document.getElementById('syncStatus').textContent = '失败：'+r.msg;
    document.getElementById('syncStatus').style.color = '#ef4444';
    alert('❌ 同步失败：'+r.msg);
  }
}
function copySyncUrl(){
  const u = localStorage.getItem('fitness_sync_url');
  if(!u){ alert('请先点「测试同步」生成地址'); return; }
  if(navigator.clipboard) navigator.clipboard.writeText(u);
  alert('已复制 AI 读取地址：\n'+u);
}
// ============ 清理空记录（exercises 为空的条目视为垃圾，自动过滤） ============
function cleanEmptyRecords(){
  if(!Array.isArray(history)) return 0;
  const before = history.length;
  history = history.filter(h => h && Array.isArray(h.exercises) && h.exercises.length > 0);
  const removed = before - history.length;
  if(removed > 0){
    saveHistory();
    // 推回云端（使用本机浏览器令牌），让 gist 镜像一并干净
    pushToGist().then(r => {
      if(!r.ok && localStorage.getItem('fitness_sync_token')){
        console.warn('清理后同步失败：' + r.msg);
      }
    });
  }
  return removed;
}
async function manualClean(){
  const removed = cleanEmptyRecords(); // 已清理本机并触发推送
  render();
  if(removed > 0){
    const r = await pushToGist(); // 二次确认云端结果，避免"假装成功"
    if(r.ok) alert('🧹 已清理 ' + removed + ' 条空记录，并已同步到云端 ✓');
    else alert('🧹 本机已清理 ' + removed + ' 条空记录，但云端同步失败：' + r.msg + '\n请打开设置→云端同步点「测试同步」重试');
  } else {
    alert('✅ 没有空记录，历史干净');
  }
}

// ============ 从云端恢复（gist 为 public，无需令牌即可读取） ============
async function doRestore(url, verbose){
  try{
    const res = await fetch(url, { cache:'no-store' });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    // RM 合并：按动作名取较新日期
    const impRm = data.rmRecords || data.rm || {};
    let added=0, updated=0;
    Object.keys(impRm).forEach(k=>{
      const inc = impRm[k];
      const ex = rmRecords[k];
      if(!ex){ rmRecords[k]=inc; added++; }
      else if(new Date(inc.date) >= new Date(ex.date)){ rmRecords[k]=inc; updated++; }
    });
    // history / state 仅在手动全量模式合并，避免覆盖本机进度
    if(verbose && Array.isArray(data.history)){
      const hmap={};
      (history||[]).forEach(h=>{ if(h&&h.date) hmap[h.date]=h; });
      data.history.forEach(h=>{ if(h&&h.date) hmap[h.date]=h; });
      history = Object.keys(hmap).sort().map(k=>hmap[k]);
    }
    if(verbose && data.state) checkedState = data.state;
    saveRmStore();
    if(verbose){ saveHistory(); saveState(); }
    render();
    if(verbose){
      alert('☁️ 已从云端恢复！\n新增 RM: '+added+' 组 · 更新 RM: '+updated+' 组\n共 '+Object.keys(rmRecords).length+' 组 RM'+(history.length?(' / '+history.length+' 条历史'):''));
    } else if(added+updated>0){
      console.log('[健身] 自动从云端恢复 RM '+added+' 新增 / '+updated+' 更新');
    }
  }catch(e){
    if(verbose) alert('❌ 恢复失败：'+e.message+'\n请确认「AI 读取地址」正确且网络可访问 gist。');
    else console.warn('[健身] 自动恢复 RM 失败：'+e.message);
  }
}
async function restoreFromCloud(){
  let url = localStorage.getItem('fitness_sync_url');
  if(!url){
    url = prompt('请输入「AI 读取地址」（在能同步的设备上：设置→云端同步→复制AI读取地址）：');
    if(!url) return;
  }
  await doRestore(url, true);
}
function autoRestoreRmIfEmpty(){
  if(Object.keys(rmRecords||{}).length > 0) return; // 本地已有 RM，不覆盖
  const url = localStorage.getItem('fitness_sync_url');
  if(!url) return;
  doRestore(url, false);
}

// ============ 历史记录查看 ============
function showHistory(){
  closeModal('settingsModal');
  let html = '<button class="back-btn" onclick="render()">← 返回训练</button>';
  html += '<h2>📋 训练历史</h2>';

  if(history.length === 0){
    html += '<div class="block" style="text-align:center;color:#666">暂无记录<br><br>完成训练后点击"保存记录"即可生成历史</div>';
  } else {
    // 统计
    const totalSessions = history.length;
    const completedSessions = history.filter(h => h.completed).length;
    const avgRPE = (history.reduce((s, h) => s + (h.rpe || 0), 0) / totalSessions).toFixed(1);

    html += '<div class="block" style="display:flex;justify-content:space-around;text-align:center">';
    html += '<div><div style="font-size:24px;font-weight:700;color:#3b82f6">' + totalSessions + '</div><div style="font-size:11px;color:#888">总训练次数</div></div>';
    html += '<div><div style="font-size:24px;font-weight:700;color:#4ade80">' + completedSessions + '</div><div style="font-size:11px;color:#888">全部完成</div></div>';
    html += '<div><div style="font-size:24px;font-weight:700;color:#fbbf24">' + avgRPE + '</div><div style="font-size:11px;color:#888">平均RPE</div></div>';
    html += '</div>';

    // 记录列表（倒序）
    const sorted = [...history].reverse();
    sorted.forEach((entry) => {
      const badge = entry.completed
        ? '<span class="h-badge complete">✅ 全完成</span>'
        : '<span class="h-badge partial">⚠️ ' + entry.completionRate + '%</span>';
      html += '<div class="hist-entry" onclick="this.classList.toggle(\'expanded\')">';
      html += '<div class="h-date">' + entry.date + ' ' + entry.dayName + badge + '</div>';
      html += '<div class="h-info">完成率 ' + entry.completionRate + '% · RPE ' + (entry.rpe || '-') + (entry.note ? ' · ' + entry.note : '') + '</div>';
      html += '<div class="h-detail">';

      if(entry.exercises && entry.exercises.length > 0){
        entry.exercises.forEach(ex => {
          html += ex.name + ': ' + ex.weight + ' × ' + ex.completedSets + '/' + ex.plannedSets + '组';
          if(ex.achievedRep) html += ' · ' + ex.achievedRep + '次';
          if(ex.rpe != null) html += ' · RPE' + ex.rpe;
          html += '<br>';
        });
      }
      if(entry.hiit) html += 'HIIT: ' + entry.hiit.completed + '/' + entry.hiit.total + '轮<br>';
      if(entry.core) html += '核心: ' + entry.core.completed + '/' + entry.core.total + ' (动作×轮)<br>';
      if(entry.recoveryItems){
        entry.recoveryItems.forEach(r => {
          html += (r.done ? '✅ ' : '☐ ') + r.name + '<br>';
        });
      }
      html += '</div></div>';
    });
  }

  document.getElementById('content').innerHTML = html;
  window.scrollTo(0, 0);
}

// ============ 渐进超负荷趋势查看 ============
function showProgressionView(){
  closeModal('settingsModal');
  let html = '<button class="back-btn" onclick="showHistory()">← 返回历史</button>';
  html += '<h2>📈 渐进超负荷趋势</h2>';

  // 按训练日类型分组
  const dayKeys = ['push', 'pull', 'legs', 'recovery'];
  const dayNames = ['推力日', '拉力日', '下肢日', '恢复日'];

  dayKeys.forEach((dk, di) => {
    const sessions = history.filter(h => h.dayKey === dk);
    if(sessions.length === 0) return;

    html += '<h3>' + dayNames[di] + '</h3>';

    // 收集所有动作名
    const exerciseNames = [];
    sessions.forEach(s => {
      (s.exercises || []).forEach(e => {
        if(!exerciseNames.includes(e.name)) exerciseNames.push(e.name);
      });
    });

    exerciseNames.forEach(name => {
      const exHistory = sessions.filter(s =>
        (s.exercises || []).some(e => e.name === name)
      );

      if(exHistory.length === 0) return;

      const rm = getRm(name);
      html += '<div class="prog-chart"><strong style="font-size:13px">' + name + '</strong>';
      if(rm) html += ' <span style="font-size:11px;color:#c9a227">🔬 RM ' + rm.weight + '×' + rm.reps + '</span>';
      html += '<table><tr><th>日期</th><th>重量</th><th>组数</th><th>次数</th><th>RPE</th></tr>';

      let prevWeight = '', prevRep = 0;
      exHistory.forEach(s => {
        const ex = s.exercises.find(e => e.name === name);
        const exRpe = (ex.rpe != null) ? ex.rpe : (s.rpe || '-');
        const weightChange = ex.weight !== prevWeight && prevWeight !== '';
        const repChange = ex.achievedRep > prevRep && prevRep > 0;
        html += '<tr>';
        html += '<td>' + s.date.substring(5) + '</td>';
        html += '<td' + (weightChange ? ' class="improvement"' : '') + '>' + ex.weight + '</td>';
        html += '<td>' + ex.completedSets + '/' + ex.plannedSets + '</td>';
        html += '<td' + (repChange ? ' class="improvement"' : '') + '>' + (ex.achievedRep || '-') + '</td>';
        html += '<td' + ((exRpe !== '-' && exRpe <= 7) ? ' class="improvement"' : '') + '>' + exRpe + '</td>';
        html += '</tr>';
        prevWeight = ex.weight;
        prevRep = ex.achievedRep || 0;
      });

      html += '</table></div>';
    });
  });

  if(html === '<button class="back-btn" onclick="showHistory()">← 返回历史</button><h2>📈 渐进超负荷趋势</h2>'){
    html += '<div class="block" style="text-align:center;color:#666">暂无训练记录<br>保存几次训练后即可看到渐进趋势</div>';
  }

  document.getElementById('content').innerHTML = html;
  window.scrollTo(0, 0);
}

function exportData(){
  const data = {
    exportDate: new Date().toISOString(),
    cycleStartDate: cycleStartDate,
    history: history,
    state: checkedState,
    rmRecords: rmRecords,
    protein: getProteinStore(),
    carb: getCarbStore()
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'fitness_data_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
  alert('✅ 数据已导出');
}

function importData(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = JSON.parse(e.target.result);
      if(!confirm('确定导入？历史与RM将与现有数据合并（不会丢失已有记录）。')) return;
      // 循环起点：兼容两种字段名
      if(data.cycleStartDate || data.cycleStart) cycleStartDate = data.cycleStartDate || data.cycleStart;
      // 历史：按日期去重合并（不覆盖已有）
      if(Array.isArray(data.history)){
        const hmap = {};
        (history||[]).forEach(h=>{ if(h&&h.date) hmap[h.date]=h; });
        data.history.forEach(h=>{ if(h&&h.date) hmap[h.date]=h; });
        history = Object.keys(hmap).sort().map(k=>hmap[k]);
      }
      if(data.state) checkedState = data.state;
      // RM：兼容 rm / rmRecords 两种字段名，且与已有合并
      const impRm = data.rmRecords || data.rm;
      if(impRm && typeof impRm==='object') rmRecords = Object.assign({}, rmRecords||{}, impRm);
      // 蛋白：按日期合并（不覆盖已有）
      if(data.protein && typeof data.protein === 'object'){
        const ps = getProteinStore();
        Object.keys(data.protein).forEach(dk=>{
          ps[dk] = (ps[dk]||[]).concat(data.protein[dk]||[]);
        });
        localStorage.setItem('fitness_protein', JSON.stringify(ps));
      }
      // 碳水：按日期合并（不覆盖已有）
      if(data.carb && typeof data.carb === 'object'){
        const cs = getCarbStore();
        Object.keys(data.carb).forEach(dk=>{
          cs[dk] = (cs[dk]||[]).concat(data.carb[dk]||[]);
        });
        localStorage.setItem('fitness_carb', JSON.stringify(cs));
      }
      localStorage.setItem('fitness_cycle_start', cycleStartDate);
      saveHistory();
      saveState();
      saveRmStore();
      currentTab = getDayIndex();
      closeModal('settingsModal');
      render();
      alert('✅ 导入成功，正在自动推送到云端…');
      pushToGist().then(r => {
        if(r.ok){
          const cnt = (history||[]).length;
          const rmCnt = Object.keys(rmRecords||{}).length;
          alert('☁️ 已自动推送 ' + cnt + ' 条历史 / ' + rmCnt + ' 组 RM 到云端。\n如「AI 读取地址」变了，请重新复制发给我一次。');
        } else if(r.msg === '未配置令牌'){
          alert('⚠️ 导入成功，但云端推送失败：未配置令牌。\n请先在「云端同步」粘贴 GitHub 令牌并点「保存配置」，再重新导入本文件。');
        } else {
          alert('⚠️ 导入成功，但云端推送失败：' + r.msg + '\n请点「测试同步」手动重试。');
        }
      });
    }catch(err){
      alert('❌ 文件格式错误');
    }
  };
  reader.readAsText(file);
}

function clearAllData(){

// ============ TIMER ============
let timerInterval = null;
let timerSeconds = 0;
let timerRunning = false;

function startTimer(sec){
  if(timerInterval) clearInterval(timerInterval);
  timerSeconds = sec;
  timerRunning = true;
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timerSeconds--;
    updateTimerDisplay();
    if(timerSeconds <= 0){
      stopTimer();
      // 震动提示
      if(navigator.vibrate) navigator.vibrate(200);
    }
  }, 1000);
  render();
}

function stopTimer(){
  if(timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  timerRunning = false;
  timerSeconds = 0;
  updateTimerDisplay();
  render();
}

function updateTimerDisplay(){
  const el = document.getElementById('timerDisplay');
  if(el){
    const m = Math.floor(timerSeconds / 60);
    const s = timerSeconds % 60;
    el.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  }
}

// ============ 蛋白追踪 ============
const PROTEIN_TARGET_MIN = 150;
const PROTEIN_TARGET_MAX = 170;
// per = 每1个基础单位的蛋白克数；unit = 计量单位；base = 默认填入量；step = 步进
const PROTEIN_PRESETS = {
  '蛋':   {label:'🥚 水煮蛋', short:'蛋', unit:'个',  per:6.5,   base:2,   step:1},
  '豆浆': {label:'🥛 无糖豆浆', short:'豆浆', unit:'ml', per:0.033, base:300, step:50},
  '鸡胸': {label:'🍗 鸡胸', short:'鸡胸', unit:'g',  per:0.24,  base:200, step:10},
  '三文鱼': {label:'🐟 三文鱼', short:'三文鱼', unit:'g', per:0.20, base:200, step:10},
  '羊排': {label:'🐑 羊排', short:'羊排', unit:'g',  per:0.20,  base:200, step:10},
  '牛肉': {label:'🥩 牛肉', short:'牛肉', unit:'g',  per:0.26,  base:200, step:10}
};
let proteinCalcFood = '鸡胸'; // 计算器当前选中的食物
function getProteinStore(){
  try { return JSON.parse(localStorage.getItem('fitness_protein') || '{}'); } catch(e){ return {}; }
}
function todayKey(){
  return new Date().toISOString().split('T')[0];
}
function nowHM(){
  const d = new Date();
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function renderProteinCard(){
  const store = getProteinStore();
  const dk = todayKey();
  const entries = store[dk] || [];
  const total = entries.reduce((s,e)=> s + (e.p||0), 0);
  const pct = Math.min(100, Math.round(total / PROTEIN_TARGET_MAX * 100));
  const met = total >= PROTEIN_TARGET_MIN;
  let html = '<div class="protein-card">';
  html += '<div class="block-title"><strong>🥩 今日蛋白</strong><span class="info">目标 ' + PROTEIN_TARGET_MIN + '–' + PROTEIN_TARGET_MAX + 'g</span></div>';
  html += '<div class="protein-bar"><div class="protein-fill" style="width:' + pct + '%"></div></div>';
  html += '<div class="protein-num"><b>' + total + '</b> / ' + PROTEIN_TARGET_MAX + ' g' + (met ? ' <span class="met">✓ 已达标</span>' : '') + '</div>';
  // 计算器：选食物
  html += '<div class="protein-calc">';
  Object.keys(PROTEIN_PRESETS).forEach(k=>{
    const sel = (k === proteinCalcFood) ? ' sel' : '';
    html += '<button class="pchip' + sel + '" onclick="setProteinFood(\'' + k + '\')">' + PROTEIN_PRESETS[k].label + '</button>';
  });
  html += '</div>';
  // 输入行：填实际用量，实时算蛋白
  const pf = PROTEIN_PRESETS[proteinCalcFood];
  html += '<div class="protein-input">';
  html += '吃了 <input id="pqty" type="number" min="0" step="' + pf.step + '" value="' + pf.base + '" oninput="updatePPreview()"> ' + pf.unit;
  html += ' <span style="color:#8fbc8f">=</span> <b id="pPreview">' + Math.round(pf.base * pf.per) + '</b>&nbsp;g蛋白';
  html += ' <button class="add-btn" onclick="addProteinCalc()">＋记录</button>';
  html += '</div>';
  // 自定义（不在列表里的食物，直接填蛋白克数）
  html += '<div class="protein-custom">';
  html += '其他食物：<input class="food" id="pfood" placeholder="名称"> <input class="gram" id="pp" type="number" min="0" placeholder="蛋白g"> <button onclick="addCustomProtein()">＋</button>';
  html += '</div>';
  if(entries.length > 0){
    html += '<div class="protein-list">';
    entries.forEach((e, i)=>{
      html += '<div class="pe"><span>' + (e.food||'?') + ' · ' + e.p + 'g' + (e.t ? ' <span style="color:#555">' + e.t + '</span>' : '') + '</span><span class="del" onclick="delProtein(' + i + ')">删除</span></div>';
    });
    html += '</div>';
  }
  html += '<div class="protein-ref">💡 减脂期按体重×1.8–2.2g，取 150–170g/日；豆浆选无糖且≥3g/100ml；总量>时机，练后不必急着补</div>';
  html += '</div>';
  return html;
}
function setProteinFood(key){
  if(PROTEIN_PRESETS[key]) proteinCalcFood = key;
  render();
}
function updatePPreview(){
  const pf = PROTEIN_PRESETS[proteinCalcFood];
  const el = document.getElementById('pqty');
  const prev = document.getElementById('pPreview');
  if(!pf || !el || !prev) return;
  const v = parseFloat(el.value);
  prev.textContent = (isNaN(v) || v < 0) ? 0 : Math.round(v * pf.per);
}
function addProteinCalc(){
  const pf = PROTEIN_PRESETS[proteinCalcFood];
  const el = document.getElementById('pqty');
  const v = el ? parseFloat(el.value) : NaN;
  if(!pf || isNaN(v) || v <= 0){ alert('请输入有效的数量'); return; }
  const p = Math.round(v * pf.per);
  const store = getProteinStore();
  const dk = todayKey();
  if(!store[dk]) store[dk] = [];
  store[dk].push({ food: pf.short + ' ' + v + pf.unit, p: p, t: nowHM() });
  localStorage.setItem('fitness_protein', JSON.stringify(store));
  render();
}
function addCustomProtein(){
  const fEl = document.getElementById('pfood');
  const pEl = document.getElementById('pp');
  const food = (fEl && fEl.value || '').trim();
  const p = pEl ? parseFloat(pEl.value) : NaN;
  if(!food || isNaN(p) || p <= 0){ alert('请填写食物名称和蛋白克数'); return; }
  const store = getProteinStore();
  const dk = todayKey();
  if(!store[dk]) store[dk] = [];
  store[dk].push({ food: food, p: Math.round(p), t: nowHM() });
  localStorage.setItem('fitness_protein', JSON.stringify(store));
  if(fEl) fEl.value = '';
  if(pEl) pEl.value = '';
  render();
}
function delProtein(idx){
  const store = getProteinStore();
  const dk = todayKey();
  if(store[dk] && store[dk][idx]){
    store[dk].splice(idx, 1);
    if(store[dk].length === 0) delete store[dk];
    localStorage.setItem('fitness_protein', JSON.stringify(store));
    render();
  }
}

// ============ 碳水 / 主食追踪 ============
// 减脂期碳水目标（g）：训练日高、休息日低。依据全天热量−蛋白−脂肪后的碳水余量估算
const CARB_TARGET = {
  train:   { min: 200, max: 250 },  // 训练日
  rest:    { min: 130, max: 170 }   // 休息/恢复日
};
// per = 每1个基础单位的碳水克数；unit = 计量单位；base = 默认填入量；step = 步进
const CARB_PRESETS = {
  '红薯': {label:'🍠 红薯', short:'红薯', unit:'g', per:0.20, base:200, step:10},
  '全麦': {label:'🍞 全麦面包', short:'全麦', unit:'片', per:18, base:2, step:1},
  '南瓜': {label:'🎃 南瓜', short:'南瓜', unit:'g', per:0.07, base:300, step:20},
  '米饭': {label:'🍚 白米饭', short:'米饭', unit:'g', per:0.26, base:150, step:10},
  '燕麦': {label:'🌾 燕麦(干)', short:'燕麦', unit:'g', per:0.60, base:40, step:5}
};
let carbCalcFood = '红薯';  // 计算器当前选中的主食
let carbExpanded = false;
function getCarbStore(){
  try { return JSON.parse(localStorage.getItem('fitness_carb') || '{}'); } catch(e){ return {}; }
}
function carbTargetForToday(){
  // 当前标签是训练日还是休息日
  const dk = getDayKey(currentTab);
  return (dk === 'recovery') ? CARB_TARGET.rest : CARB_TARGET.train;
}
function toggleCarbBody(){
  carbExpanded = !carbExpanded;
  const el = document.getElementById('carbBody');
  const tg = document.getElementById('carbToggle');
  if(el) el.classList.toggle('show', carbExpanded);
  if(tg) tg.textContent = carbExpanded ? '收起份量参考表 ▲' : '📊 展开份量参考表 ▼';
}
function renderCarbCard(){
  const store = getCarbStore();
  const dk = todayKey();
  const entries = store[dk] || [];
  const total = entries.reduce((s,e)=> s + (e.c||0), 0);
  const tgt = carbTargetForToday();
  const isRest = getDayKey(currentTab) === 'recovery';
  const pct = Math.min(100, Math.round(total / tgt.max * 100));
  let statusTag = '';
  if(total >= tgt.min && total <= tgt.max) statusTag = ' <span class="met">✓ 在区间</span>';
  else if(total > tgt.max) statusTag = ' <span class="over">⚠ 超上限</span>';

  let html = '<div class="carb-card">';
  html += '<div class="block-title"><strong>🍚 今日碳水</strong><span class="info">' + (isRest ? '休息日' : '训练日') + ' 目标 ' + tgt.min + '–' + tgt.max + 'g</span></div>';
  html += '<div class="carb-bar"><div class="carb-fill" style="width:' + pct + '%"></div></div>';
  html += '<div class="carb-num"><b>' + total + '</b> / ' + tgt.max + ' g<span class="rng">（区间 ' + tgt.min + '–' + tgt.max + '）</span>' + statusTag + '</div>';
  // 计算器：选主食
  html += '<div class="carb-calc">';
  Object.keys(CARB_PRESETS).forEach(k=>{
    const sel = (k === carbCalcFood) ? ' sel' : '';
    html += '<button class="cchip' + sel + '" onclick="setCarbFood(\'' + k + '\')">' + CARB_PRESETS[k].label + '</button>';
  });
  html += '</div>';
  // 输入行：填实际用量，实时算碳水
  const cf = CARB_PRESETS[carbCalcFood];
  html += '<div class="carb-input">';
  html += '吃了 <input id="cqty" type="number" min="0" step="' + cf.step + '" value="' + cf.base + '" oninput="updateCPreview()"> ' + cf.unit;
  html += ' <span style="color:#7b9fe0">=</span> <b id="cPreview">' + Math.round(cf.base * cf.per) + '</b>&nbsp;g碳水';
  html += ' <button class="add-btn" onclick="addCarbCalc()">＋记录</button>';
  html += '</div>';
  // 自定义
  html += '<div class="carb-custom">';
  html += '其他主食：<input class="food" id="cfood" placeholder="名称"> <input class="gram" id="cc" type="number" min="0" placeholder="碳水g"> <button onclick="addCustomCarb()">＋</button>';
  html += '</div>';
  if(entries.length > 0){
    html += '<div class="carb-list">';
    entries.forEach((e, i)=>{
      html += '<div class="ce"><span>' + (e.food||'?') + ' · ' + e.c + 'g' + (e.t ? ' <span style="color:#555">' + e.t + '</span>' : '') + '</span><span class="del" onclick="delCarb(' + i + ')">删除</span></div>';
    });
    html += '</div>';
  }
  // 折叠：份量参考表
  html += '<span class="carb-toggle" id="carbToggle" onclick="toggleCarbBody()">' + (carbExpanded ? '收起份量参考表 ▲' : '📊 展开份量参考表 / 吃法原则 ▼') + '</span>';
  html += '<div class="carb-body' + (carbExpanded ? ' show' : '') + '" id="carbBody">';
  html += '<div style="font-size:12px;color:#cdd9e8;line-height:1.7;margin-top:4px">训练日正常吃，休息日降到 <b style="color:#60a5fa">60–70%</b>；<b style="color:#60a5fa">总量优先</b>，练后不必急着补。优先低GI，白米饭这类高GI放到训练日/练后。</div>';
  html += '<table><tr><th>主食</th><th>碳水/100g</th><th>GI</th><th>一餐建议<br><span style="font-weight:400;color:#6f8fbf">(约40–50g碳水)</span></th></tr>';
  html += '<tr><td>红薯(蒸/烤)</td><td>~20g</td><td class="gi-mid">中·63</td><td>200–250g</td></tr>';
  html += '<tr><td>全麦面包</td><td>~45g/100g(约18g/片)</td><td class="gi-mid">中·55</td><td>约2片</td></tr>';
  html += '<tr><td>南瓜</td><td>~7g</td><td class="gi-mid">中·65</td><td>300g+ 热量低可多吃/配菜</td></tr>';
  html += '<tr><td>白米饭(熟)</td><td>~26g</td><td class="gi-high">高·73</td><td>150–180g · 放训练日</td></tr>';
  html += '<tr><td>燕麦(干)</td><td>~60g</td><td class="gi-low">低·55</td><td>40–50g(泡/煮)</td></tr>';
  html += '</table>';
  html += '<div class="carb-note">💡 <b style="color:#4ade80">优先级：燕麦 ＞ 红薯 ≈ 全麦 ＞ 南瓜 ＞ 白米饭</b>（低GI+纤维更利减脂饱腹）。南瓜碳水低、水分多，当"扩量配菜"很好但别当唯一主食。<br>🎯 每日碳水量 = 全天总热量 − 蛋白(150–170g) − 脂肪(≥总热20%) 后的剩余；训练日往上放（≈200–250g），休息日砍到约70%（≈130–170g）。<br>📚 基石第49/58条：总量＞时机；第22条：脂肪不低于总热20%。</div>';
  html += '</div></div>';
  return html;
}
function setCarbFood(key){
  if(CARB_PRESETS[key]) carbCalcFood = key;
  render();
}
function updateCPreview(){
  const cf = CARB_PRESETS[carbCalcFood];
  const el = document.getElementById('cqty');
  const prev = document.getElementById('cPreview');
  if(!cf || !el || !prev) return;
  const v = parseFloat(el.value);
  prev.textContent = (isNaN(v) || v < 0) ? 0 : Math.round(v * cf.per);
}
function addCarbCalc(){
  const cf = CARB_PRESETS[carbCalcFood];
  const el = document.getElementById('cqty');
  const v = el ? parseFloat(el.value) : NaN;
  if(!cf || isNaN(v) || v <= 0){ alert('请输入有效的数量'); return; }
  const c = Math.round(v * cf.per);
  const store = getCarbStore();
  const dk = todayKey();
  if(!store[dk]) store[dk] = [];
  store[dk].push({ food: cf.short + ' ' + v + cf.unit, c: c, t: nowHM() });
  localStorage.setItem('fitness_carb', JSON.stringify(store));
  render();
}
function addCustomCarb(){
  const fEl = document.getElementById('cfood');
  const cEl = document.getElementById('cc');
  const food = (fEl && fEl.value || '').trim();
  const c = cEl ? parseFloat(cEl.value) : NaN;
  if(!food || isNaN(c) || c <= 0){ alert('请填写主食名称和碳水克数'); return; }
  const store = getCarbStore();
  const dk = todayKey();
  if(!store[dk]) store[dk] = [];
  store[dk].push({ food: food, c: Math.round(c), t: nowHM() });
  localStorage.setItem('fitness_carb', JSON.stringify(store));
  if(fEl) fEl.value = '';
  if(cEl) cEl.value = '';
  render();
}
function delCarb(idx){
  const store = getCarbStore();
  const dk = todayKey();
  if(store[dk] && store[dk][idx]){
    store[dk].splice(idx, 1);
    if(store[dk].length === 0) delete store[dk];
    localStorage.setItem('fitness_carb', JSON.stringify(store));
    render();
  }
}

// ============ RENDER ============
function switchTab(idx){
  if(timerRunning) stopTimer();
  currentTab = idx;
  render();
}

function render(){
  const plan = getPlan(currentTab);
  const dayKey = getDayKey(currentTab);
  const todayIdx = getDayIndex();
  const { total, done } = countDone();

  // Header
  const shiftCount = getShiftCount();
  const shiftText = shiftCount !== 0 ? '（顺延' + (shiftCount > 0 ? '+' : '') + shiftCount + '天）' : '';
  document.getElementById('dayLabel').innerHTML =
    '📅 ' + new Date().toLocaleDateString('zh-CN', { weekday: 'short', month: 'short', day: 'numeric' }) +
    ' · 循环第' + (currentTab + 1) + '天' + shiftText;

  // Tabs
  let tabsHtml = '';
  for(let i = 0; i < DAYS.length; i++){
    const cls = ['tab'];
    if(i === currentTab) cls.push('active');
    if(i === todayIdx) cls.push('today');
    tabsHtml += '<div class="' + cls.join(' ') + '" onclick="switchTab(' + i + ')">' + (i + 1) + '.' + DAYS[i].substring(0, 3) + '</div>';
  }
  document.getElementById('tabs').innerHTML = tabsHtml;

  // Timer bar
  let timerHtml = '<div class="timer ' + (timerInterval ? 'show' : '') + '" id="timerBar">';
  timerHtml += '<div class="time" id="timerDisplay">00:00</div>';
  const times = plan.supersets && plan.supersets.length > 0
    ? plan.supersets.map(s => s.rest).filter((v, i, a) => a.indexOf(v) === i).sort((a, b) => a - b)
    : [60, 90];
  timerHtml += times.map(t => {
    const m = Math.floor(t / 60), s = t % 60;
    const label = m > 0 ? m + 'm' + (s > 0 ? s + 's' : '') : s + 's';
    return '<button onclick="startTimer(' + t + ')" class="' + (timerSeconds === t && timerRunning ? 'active' : '') + '">休息' + label + '</button>';
  }).join('');
  timerHtml += '<button onclick="stopTimer()" style="border-color:#ef4444;color:#ef4444">停止</button></div>';

  let html = timerHtml;

  // 今日蛋白追踪（每天显示，含云端同步）
  html += renderProteinCard();

  // 主食 / 碳水指南
  html += renderCarbCard();

  // Warmup
  if(plan.warmup){
    html += '<div class="block"><strong>🔥 热身 5min</strong><br><span style="font-size:13px;color:#aaa">' + plan.warmup + '</span></div>';
  }

  // Supersets with progressive overload hints
  if(plan.supersets){
    plan.supersets.forEach((ss, ssIdx) => {
      const isSolo = ss.items.length === 1;
      html += '<div class="block"><div class="block-title">';
      html += '<strong>' + ss.label + '</strong>';
      html += '<span class="info">' + ss.rounds + '轮' + (isSolo ? '' : ' · A↔B交替') + '<br><span class="rest">歇' + ss.rest + 's</span></span>';
      html += '</div>';

      ss.items.forEach((ex, exIdx) => {
        const exId = 'detail_' + currentTab + '_' + ssIdx + '_' + exIdx;

        // 获取渐进超负荷建议
        const suggestion = getProgressionSuggestion(dayKey, ssIdx, exIdx, ex);
        const suggestClass = suggestion.type === 'catchup' ? 'warn' : 'suggest';

        html += '<div class="exercise"><div class="ex-con">';
        const rm = getRm(ex.name);
        html += '<div class="ex-name">' + ex.name + ' <span class="rm-test-btn" onclick="openRmModal(\'' + ex.name + '\',\'' + (rm ? rm.weight : '') + '\')">🔬测RM</span></div>';
        html += '<div class="ex-spec">' + (suggestion.rmWeight || ex.weight) + ' · 目标' + suggestion.targetRep + '次/组</div>';
        html += '<div class="' + (rm ? 'ex-rm' : 'ex-rm none') + '">🔬 ' + (rm ? ('你的RM ' + rm.weight + '×' + rm.reps + ' (' + rm.date.substring(5) + ')') : '未测RM — 点上方「测RM」校准') + '</div>';

        // 渐进超负荷提示
        html += '<div class="ex-progress last">📊 ' + suggestion.lastText + '</div>';
        html += '<div class="ex-progress ' + suggestClass + '">🎯 ' + suggestion.suggestText + '</div>';

        // Set circles（组数跟随渐进建议：加组时多渲染一组，上限4）
        const er = effectiveRounds(dayKey, ss, ssIdx, exIdx, ex);
        html += '<div class="sets">';
        for(let i = 0; i < er; i++){
          const isDone = isSetDone(dayKey, ssIdx, exIdx, i);
          html += '<div class="set ' + (isDone ? 'done' : '') + '" onclick="toggleSet(\'' + dayKey + '_' + ssIdx + '_' + exIdx + '_' + i + '\')">' + (isDone ? '✓' : i + 1) + '</div>';
        }
        html += '</div>';

        if(ex.detail){
          const std = ACTION_STANDARDS[ex.name];
          const stdHtml = std ? '<br><span style="color:#c9a227">📏 全程标准：' + std.anchor + '</span><br><span style="color:#e07a5f">⚠️ 常见错误：' + std.errors + '</span>' : '';
          html += '<span class="ex-toggle" onclick="toggleDetail(\'' + exId + '\')">💡 动作要点（含标准）</span>';
          html += '<div class="ex-detail" id="' + exId + '">' + ex.detail + stdHtml + '</div>';
        }
        html += '</div></div>';
      });
      html += '</div>';
    });
  }

  // Core（按轮整体勾选：做完一轮全部动作勾一次）
  if(plan.core){
    html += '<div class="block"><div class="block-title"><strong>核心循环</strong><span class="info">' + plan.core.length + '动作 · 2轮 · 各45s</span></div>';
    plan.core.forEach((c, i) => {
      const cId = 'core_detail_' + currentTab + '_' + i;
      html += '<div class="exercise"><div class="ex-con">';
      html += '<div class="ex-name">' + c.name + ' <span style="font-size:11px;color:#888">' + c.spec + '</span></div>';
      if(c.detail){
        html += '<span class="ex-toggle" onclick="toggleDetail(\'' + cId + '\')">💡 要点</span>';
        html += '<div class="ex-detail" id="' + cId + '">' + c.detail + '</div>';
      }
      html += '</div></div>';
    });
    html += '<div class="sets" style="margin-top:8px">';
    html += '<div class="set ' + (coreRoundDone(dayKey, 0) ? 'done' : '') + '" style="width:auto;padding:0 14px;border-radius:14px" onclick="toggleCoreRound(0)">' + (coreRoundDone(dayKey, 0) ? '✓ 第1轮' : '☐ 第1轮') + '</div>';
    html += '<div class="set ' + (coreRoundDone(dayKey, 1) ? 'done' : '') + '" style="width:auto;padding:0 14px;border-radius:14px" onclick="toggleCoreRound(1)">' + (coreRoundDone(dayKey, 1) ? '✓ 第2轮' : '☐ 第2轮') + '</div>';
    html += '</div>';
    html += '</div>';
  }

  // HIIT
  if(plan.hiit && plan.hiit.length > 0){
    html += '<div class="hiit-block">';
    html += '<strong>⚡ HIIT 4轮</strong> <span style="font-size:12px;color:#aaa">30s on / 15s off</span>';
    html += '<div style="font-size:13px;color:#ddd;margin:4px 0">' + plan.hiit.join(' → ') + '</div>';
    html += '<div class="rounds">';
    for(let i = 0; i < 4; i++){
      html += '<div class="hiit-round ' + (isHiitDone(dayKey, i) ? 'done' : '') + '" onclick="toggleHiit(' + i + ')">' + (i + 1) + '</div>';
    }
    html += '</div></div>';
  }

  // Recovery items
  if(plan.items){
    plan.items.forEach((item, i) => {
      const key = dayKey + '_items_' + i;
      const arr = checkedState[key] || [];
      html += '<div class="block"><div class="exercise"><div class="ex-con">';
      html += '<div class="ex-name">' + item.name + ' <span style="font-size:12px;color:#888">' + item.spec + '</span></div>';
      html += '<div class="ex-detail show">' + item.detail + '</div>';
      html += '<div class="sets" style="margin-top:6px">';
      html += '<div class="set ' + (arr.length > 0 ? 'done' : '') + '" style="width:auto;padding:0 10px;border-radius:14px" onclick="toggleRecoveryItem(\'' + key + '\')">' + (arr.length > 0 ? '✓ 完成' : '☐ 打卡') + '</div>';
      html += '</div></div></div></div>';
    });
  }

  // Cooldown
  if(plan.cooldown){
    html += '<div class="block"><strong>🧊 放松 2min</strong><br><span style="font-size:13px;color:#aaa">' + plan.cooldown + '</span></div>';
  }

  // Footer
  html += '<div style="text-align:center;margin:20px 0;font-size:13px;color:#555">';
  html += '<a href="javascript:showHistory()" style="color:#555">📋 历史(' + history.length + ')</a> &nbsp;·&nbsp; ';
  html += '<a href="javascript:showSettings()" style="color:#555">⚙️ 设置</a> &nbsp;·&nbsp; ';
  html += '<a href="javascript:shiftCycle(1)" style="color:#555">⏭ 顺延</a><br>';
  html += '目标：72kg / 15%体脂 · 蛋白150g+/天';
  if(shiftCount !== 0){
    html += '<br><span style="color:#3b82f6">顺延' + (shiftCount > 0 ? '+' : '') + shiftCount + '天</span>';
  }
  html += '</div>';

  document.getElementById('content').innerHTML = html;
  document.getElementById('doneCount').textContent = done;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('saveBtn').disabled = (done === 0);

  if(timerInterval){
    updateTimerDisplay();
    const timerBar = document.getElementById('timerBar');
    if(timerBar) timerBar.classList.add('show');
  }
}

// ============ INIT ============
init();
</script>

if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js').catch(function(e){ console.log('SW registration failed:', e); });
  });
}
